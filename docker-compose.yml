version: '3.8'

services:
  myhome:
    container_name: myhome-app
    # GitHub Container Registry(GHCR)에 푸시된 이미지를 지정합니다. 
    # 본인의 GitHub 사용자명 또는 리포지토리 설정에 맞춰 변경해 주세요.
    image: ghcr.io/your-github-username/myhome-app:latest
    restart: unless-stopped
    ports:
      - "4174:4174"
    volumes:
      # SQLite 데이터베이스 등 영구 데이터 저장을 위한 볼륨 매핑
      - ./data:/app/data
      # 필요한 경우 로컬의 config.yaml 설정 주입
      - ./config.yaml:/app/config.yaml
    environment:
      - PORT=4174
      - HOST=0.0.0.0
      - CHECK_INTERVAL_SECONDS=300
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
      - KAKAO_JAVASCRIPT_KEY=${KAKAO_JAVASCRIPT_KEY}
      - KAKAO_NATIVE_APP_KEY=${KAKAO_NATIVE_APP_KEY}
      - VITE_KAKAO_MAP_API_KEY=${VITE_KAKAO_MAP_API_KEY}
      - DATA_GO_KR_API_KEY=${DATA_GO_KR_API_KEY}
      - GRAPH_DB_ENABLED=true
      - SQLITE_DB_PATH=/app/data/myhome.db
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - ALLOWED_EMAILS=${ALLOWED_EMAILS}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
